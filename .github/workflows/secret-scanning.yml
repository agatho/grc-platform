name: Secret Scanning (ADR-018 Phase 0)

# Scans PR diffs + main branch for accidentally committed secrets.
# Uses gitleaks (fast, regex-based, zero config). GitHub's built-in
# secret scanning runs in parallel on pushes to public repos.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1"  # weekly Monday 06:00 UTC

permissions:
  contents: read
  pull-requests: write

jobs:
  gitleaks:
    name: gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # gitleaks needs full history to diff against main

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_LICENSE -> runs in OSS mode (rate-limited but fine
          # for small repos)
