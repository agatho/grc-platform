name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
        with:
          # Fail on high/critical vulnerabilities
          fail-on-severity: high
          # Deny copyleft licenses for runtime deps
          deny-licenses: GPL-2.0-only, GPL-3.0-only, AGPL-3.0-only
          # Per-package exemptions — these CI-only actions are AGPL but we
          # accept the licence because they don't ship in any built
          # artefact. Adding a package here is a deliberate decision: only
          # CI/dev-only tools belong in this list.
          #
          # - trufflesecurity/trufflehog (AGPL-3.0): secret scanner. Kept
          #   alongside gitleaks as second-opinion coverage ("4 eyes see
          #   more than 2"). Runs in CI only; never bundled into web /
          #   worker images.
          allow-dependencies-licenses: pkg:githubactions/trufflesecurity/trufflehog
          # Comment on PR with findings
          comment-summary-in-pr: always
