# ARCTOS GRC Platform — Local Development
# Usage: docker compose up -d postgres
# Then: npm install && npm run db:seed && npm run db:seed-all && npm run dev
version: "3.9"
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: grc
      POSTGRES_PASSWORD: grc_dev_password
      POSTGRES_DB: grc_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-extensions.sql:/docker-entrypoint-initdb.d/001_extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grc -d grc_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
