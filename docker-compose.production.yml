# ============================================================================
# ARCTOS GRC Platform — Production Stack
# Usage: docker compose -f docker-compose.production.yml up -d
# ============================================================================

services:
  # ── PostgreSQL + TimescaleDB ──────────────────────────────────
  postgres:
    # #DEP-CONFIG: pinned to a specific TimescaleDB minor for
    # immutability. `latest-pg16` is a moving tag and TimescaleDB
    # extension semantics don't always survive bumps.
    #
    # 2026-05-26: bumped 2.17.2 → 2.26.3. The DB was previously run
    # under `:latest-pg16` and the timescaledb extension was upgraded
    # to 2.26.3 in pg_extension. After the pin to 2.17.2 in #265,
    # every postgres connection hit `could not access file
    # "$libdir/timescaledb-2.26.3"` — the catalog referenced the
    # newer .so but the older container only shipped 2.17.x. Worker
    # crash-looped; web survived only because it caches at boot.
    # 2.26.3-pg16 matches the DB's expected extension version.
    # Operators who want bit-identical can replace with a digest:
    #   image: timescale/timescaledb@sha256:...
    image: timescale/timescaledb:2.26.3-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: grc
      # #DEP-CONFIG-HIGH-3: fail-fast on missing. The previous fallback
      # `grc_prod_password` was identical to the dev default — trivial
      # to ship a prod node with the dev password by accident.
      # `${VAR:?msg}` aborts `docker compose up` if VAR is unset,
      # matching the pattern AUTH_SECRET + WB_ENCRYPTION_KEY use below.
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: grc_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grc -d grc_platform"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - arctos

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    # #DEP-CONFIG: pinned minor (was `redis:7-alpine`, moving tag).
    image: redis:7.4-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arctos

  # ── MinIO (S3-kompatibler Objektspeicher, self-hosted) ────────
  # DMS-File-Storage. Der Web-Container ist read_only — lokales FS
  # funktioniert dort nur über das uploads-Volume; MinIO ist der
  # empfohlene Backend (STORAGE_BACKEND=s3 in .env). Path-style URLs.
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    # RAM-Deckel: verhindert, dass der Sidecar den Host in den OOM treibt
    mem_limit: 512m
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-arctos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - arctos
    # Kein Port exposed — nur intern; Console bei Bedarf via SSH-Tunnel:
    # ssh -L 9001:localhost:9001 und Port temporär mappen.

  # One-shot: Bucket anlegen (idempotent), dann Exit.
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set arctos http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing arctos/$${S3_BUCKET} &&
      echo 'minio-init: bucket ready'"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-arctos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
      S3_BUCKET: ${S3_BUCKET:-arctos-dms}
    networks:
      - arctos
    restart: "no"

  # ── ClamAV (Malware-Scan für DMS-Uploads) ─────────────────────
  # Achtung: braucht ~1–1.5 GB RAM für die Signatur-DB. Auf kleinen
  # Servern vorher `free -h` prüfen. Ohne CLAMAV_HOST in .env wird
  # der Scan app-seitig einfach übersprungen — der Container kann
  # dann entfernt/gestoppt werden.
  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    # RAM-Deckel (Signatur-DB braucht ~1,2-1,4 GB). 2026-07-24: Der Sidecar
    # hat auf dem 16-GB-Server den Host-OOM mit ausgeloest — update-all.sh
    # startet ihn deshalb nur noch, wenn CLAMAV_HOST in der .env aktiv ist.
    mem_limit: 1600m
    volumes:
      - clamdb:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - arctos

  # ── ARCTOS Web App ────────────────────────────────────────────
  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-arctos}/grc-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      # Build-time provenance metadata. deploy/update-all.sh exports
      # these env vars before `docker compose build`. If a manual
      # `docker compose up --build` is run without them set, the
      # Dockerfile's `ARG ... =unknown` defaults kick in and
      # /api/v1/meta/build serves "unknown" — visible in CI gates
      # and the build endpoint, which is the prompt to either run
      # via the wrapper or `export GIT_SHA=$(git rev-parse HEAD)` first.
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # Fallback für STORAGE_BACKEND=local + Branding-Logos: ohne diese
      # Volumes schlagen Datei-Uploads am read_only-Rootfs fehl (EROFS).
      - uploads:/app/uploads
      - branding:/app/apps/web/public/uploads
    environment:
      DATABASE_URL: postgresql://grc:${DB_PASSWORD:?Set DB_PASSWORD in .env}@postgres:5432/grc_platform
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
      WB_ENCRYPTION_KEY: ${WB_ENCRYPTION_KEY:?Set WB_ENCRYPTION_KEY in .env}
      CONNECTOR_ENCRYPTION_KEY: ${CONNECTOR_ENCRYPTION_KEY}
      # Encrypt-at-rest for single-column app secrets (SSO client secret,
      # connector OAuth refresh tokens). openssl rand -base64 32
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:-}
      SECRET_ENCRYPTION_KEY_PREVIOUS: ${SECRET_ENCRYPTION_KEY_PREVIOUS:-}
      CRON_SECRET: ${CRON_SECRET:?Set CRON_SECRET in .env}
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      RUN_SEEDS: ${RUN_SEEDS:-false}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      # Optional
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      # DMS-Storage (local = Volume oben; s3 = MinIO-Sidecar/extern)
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads/documents}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-1}
      # ClamAV-Scan (leer = übersprungen)
      CLAMAV_HOST: ${CLAMAV_HOST:-}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
      CLAMAV_FAIL_CLOSED: ${CLAMAV_FAIL_CLOSED:-}
      # Impressum (§ 5 DDG) — siehe .env.production.example
      IMPRINT_COMPANY_NAME: ${IMPRINT_COMPANY_NAME:-}
      IMPRINT_LEGAL_FORM: ${IMPRINT_LEGAL_FORM:-}
      IMPRINT_STREET: ${IMPRINT_STREET:-}
      IMPRINT_CITY: ${IMPRINT_CITY:-}
      IMPRINT_COUNTRY: ${IMPRINT_COUNTRY:-Deutschland}
      IMPRINT_EMAIL: ${IMPRINT_EMAIL:-}
      IMPRINT_PHONE: ${IMPRINT_PHONE:-}
      IMPRINT_MANAGING_DIRECTORS: ${IMPRINT_MANAGING_DIRECTORS:-}
      IMPRINT_REGISTER_COURT: ${IMPRINT_REGISTER_COURT:-}
      IMPRINT_REGISTER_NUMBER: ${IMPRINT_REGISTER_NUMBER:-}
      IMPRINT_VAT_ID: ${IMPRINT_VAT_ID:-}
      IMPRINT_BUSINESS_ID: ${IMPRINT_BUSINESS_ID:-}
      IMPRINT_SUPERVISORY_AUTHORITY: ${IMPRINT_SUPERVISORY_AUTHORITY:-}
      IMPRINT_PROFESSIONAL_TITLE: ${IMPRINT_PROFESSIONAL_TITLE:-}
      IMPRINT_RESPONSIBLE_FOR_CONTENT: ${IMPRINT_RESPONSIBLE_FOR_CONTENT:-}
      IMPRINT_SHOW_EU_DISPUTE_NOTICE: ${IMPRINT_SHOW_EU_DISPUTE_NOTICE:-true}
      IMPRINT_ADDITIONAL_TEXT: ${IMPRINT_ADDITIONAL_TEXT:-}
      # Datenschutz-Defaults
      PRIVACY_CONTROLLER_NAME: ${PRIVACY_CONTROLLER_NAME:-}
      PRIVACY_CONTROLLER_ADDRESS: ${PRIVACY_CONTROLLER_ADDRESS:-}
      PRIVACY_DPO_NAME: ${PRIVACY_DPO_NAME:-}
      PRIVACY_DPO_EMAIL: ${PRIVACY_DPO_EMAIL:-}
      PRIVACY_HOSTING_LOCATION: ${PRIVACY_HOSTING_LOCATION:-Hetzner Online GmbH, Deutschland}
      PRIVACY_SUPERVISORY_AUTHORITY: ${PRIVACY_SUPERVISORY_AUTHORITY:-}
      PRIVACY_ADDITIONAL_TEXT: ${PRIVACY_ADDITIONAL_TEXT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arctos

  # ── ARCTOS Worker (Cron Jobs, Background Tasks) ───────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      DATABASE_URL: postgresql://grc:${DB_PASSWORD:?Set DB_PASSWORD in .env}@postgres:5432/grc_platform
      CRON_SECRET: ${CRON_SECRET:?Set CRON_SECRET in .env}
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Embedding-Sync-Cron braucht den OpenAI-Key (fehlte bisher!)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Connector-/SSO-Secret-Entschlüsselung in Crons
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:-}
      SECRET_ENCRYPTION_KEY_PREVIOUS: ${SECRET_ENCRYPTION_KEY_PREVIOUS:-}
      # Retention-Purge löscht Files über das Storage-Interface —
      # muss dieselbe Storage-Config sehen wie web
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads/documents}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-1}
      PORT: "3001"
    volumes:
      # Gleiche Sicht auf lokale Uploads wie web (Retention-Purge/Erase)
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arctos
    # Kein Port exposed — nur intern via Docker-Netzwerk erreichbar

volumes:
  pgdata:
  uploads:
  branding:
  miniodata:
  clamdb:

networks:
  arctos:
    driver: bridge
