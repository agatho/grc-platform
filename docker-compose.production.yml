# ============================================================================
# ARCTOS GRC Platform — Production Stack
# Usage: docker compose -f docker-compose.production.yml up -d
# ============================================================================

services:
  # ── PostgreSQL + TimescaleDB ──────────────────────────────────
  postgres:
    # #DEP-CONFIG: pinned to a specific TimescaleDB minor for
    # immutability. `latest-pg16` is a moving tag and TimescaleDB
    # extension semantics don't always survive bumps.
    #
    # 2026-05-26: bumped 2.17.2 → 2.26.3. The DB was previously run
    # under `:latest-pg16` and the timescaledb extension was upgraded
    # to 2.26.3 in pg_extension. After the pin to 2.17.2 in #265,
    # every postgres connection hit `could not access file
    # "$libdir/timescaledb-2.26.3"` — the catalog referenced the
    # newer .so but the older container only shipped 2.17.x. Worker
    # crash-looped; web survived only because it caches at boot.
    # 2.26.3-pg16 matches the DB's expected extension version.
    # Operators who want bit-identical can replace with a digest:
    #   image: timescale/timescaledb@sha256:...
    image: timescale/timescaledb:2.26.3-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: grc
      # #DEP-CONFIG-HIGH-3: fail-fast on missing. The previous fallback
      # `grc_prod_password` was identical to the dev default — trivial
      # to ship a prod node with the dev password by accident.
      # `${VAR:?msg}` aborts `docker compose up` if VAR is unset,
      # matching the pattern AUTH_SECRET + WB_ENCRYPTION_KEY use below.
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: grc_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grc -d grc_platform"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - arctos

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    # #DEP-CONFIG: pinned minor (was `redis:7-alpine`, moving tag).
    image: redis:7.4-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arctos

  # ── ARCTOS Web App ────────────────────────────────────────────
  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-arctos}/grc-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    environment:
      DATABASE_URL: postgresql://grc:${DB_PASSWORD:?Set DB_PASSWORD in .env}@postgres:5432/grc_platform
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
      WB_ENCRYPTION_KEY: ${WB_ENCRYPTION_KEY:?Set WB_ENCRYPTION_KEY in .env}
      CONNECTOR_ENCRYPTION_KEY: ${CONNECTOR_ENCRYPTION_KEY}
      CRON_SECRET: ${CRON_SECRET:?Set CRON_SECRET in .env}
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      RUN_SEEDS: ${RUN_SEEDS:-false}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      # Optional
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      # Impressum (§ 5 DDG) — siehe .env.production.example
      IMPRINT_COMPANY_NAME: ${IMPRINT_COMPANY_NAME:-}
      IMPRINT_LEGAL_FORM: ${IMPRINT_LEGAL_FORM:-}
      IMPRINT_STREET: ${IMPRINT_STREET:-}
      IMPRINT_CITY: ${IMPRINT_CITY:-}
      IMPRINT_COUNTRY: ${IMPRINT_COUNTRY:-Deutschland}
      IMPRINT_EMAIL: ${IMPRINT_EMAIL:-}
      IMPRINT_PHONE: ${IMPRINT_PHONE:-}
      IMPRINT_MANAGING_DIRECTORS: ${IMPRINT_MANAGING_DIRECTORS:-}
      IMPRINT_REGISTER_COURT: ${IMPRINT_REGISTER_COURT:-}
      IMPRINT_REGISTER_NUMBER: ${IMPRINT_REGISTER_NUMBER:-}
      IMPRINT_VAT_ID: ${IMPRINT_VAT_ID:-}
      IMPRINT_BUSINESS_ID: ${IMPRINT_BUSINESS_ID:-}
      IMPRINT_SUPERVISORY_AUTHORITY: ${IMPRINT_SUPERVISORY_AUTHORITY:-}
      IMPRINT_PROFESSIONAL_TITLE: ${IMPRINT_PROFESSIONAL_TITLE:-}
      IMPRINT_RESPONSIBLE_FOR_CONTENT: ${IMPRINT_RESPONSIBLE_FOR_CONTENT:-}
      IMPRINT_SHOW_EU_DISPUTE_NOTICE: ${IMPRINT_SHOW_EU_DISPUTE_NOTICE:-true}
      IMPRINT_ADDITIONAL_TEXT: ${IMPRINT_ADDITIONAL_TEXT:-}
      # Datenschutz-Defaults
      PRIVACY_CONTROLLER_NAME: ${PRIVACY_CONTROLLER_NAME:-}
      PRIVACY_CONTROLLER_ADDRESS: ${PRIVACY_CONTROLLER_ADDRESS:-}
      PRIVACY_DPO_NAME: ${PRIVACY_DPO_NAME:-}
      PRIVACY_DPO_EMAIL: ${PRIVACY_DPO_EMAIL:-}
      PRIVACY_HOSTING_LOCATION: ${PRIVACY_HOSTING_LOCATION:-Hetzner Online GmbH, Deutschland}
      PRIVACY_SUPERVISORY_AUTHORITY: ${PRIVACY_SUPERVISORY_AUTHORITY:-}
      PRIVACY_ADDITIONAL_TEXT: ${PRIVACY_ADDITIONAL_TEXT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arctos

  # ── ARCTOS Worker (Cron Jobs, Background Tasks) ───────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      DATABASE_URL: postgresql://grc:${DB_PASSWORD:?Set DB_PASSWORD in .env}@postgres:5432/grc_platform
      CRON_SECRET: ${CRON_SECRET:?Set CRON_SECRET in .env}
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arctos
    # Kein Port exposed — nur intern via Docker-Netzwerk erreichbar

volumes:
  pgdata:

networks:
  arctos:
    driver: bridge
